name: BBB Predictor CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies (no torch for CI speed)
      run: |
        python -m pip install --upgrade pip
        pip install rdkit scikit-learn pandas numpy matplotlib seaborn shap pytest

    - name: Run unit tests
      run: |
        pytest tests/test_pipeline.py -v --tb=short

    - name: Check code style
      run: |
        pip install flake8
        flake8 src/ scripts/ --max-line-length=100 --ignore=E501,W503 || true

    - name: Verify data file exists
      run: |
        python -c "import pandas as pd; df = pd.read_csv('data/raw/bbbp.csv'); print(f'Dataset: {len(df)} compounds')"
